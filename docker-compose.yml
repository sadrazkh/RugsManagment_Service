services:
  postgres:
    image: postgres:16-alpine
    container_name: rugs_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rugs_management
    ports:
      - "5432:5432"
    volumes:
      - rugs_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  rugs_pg_data:
