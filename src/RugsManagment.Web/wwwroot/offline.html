<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>آفلاین</title>
  <style>
    body { font-family: Tahoma, sans-serif; display: grid; place-items: center; min-height: 100vh; margin: 0; background: #fbf9f5; color: #1b1c1a; }
    .box { text-align: center; padding: 2rem; }
    .m { width: 64px; height: 64px; display: grid; place-items: center; border-radius: 16px; background: #6b0008; color: #fff; font-size: 32px; margin: 0 auto 1rem; }
    button { margin-top: 1rem; background: #6b0008; color: #fff; border: 0; border-radius: 8px; padding: .6rem 1.2rem; font: inherit; cursor: pointer; }
  </style>
</head>
<body>
  <div class="box">
    <div class="m">ف</div>
    <h1>اتصال اینترنت برقرار نیست</h1>
    <p>برای مشاهدهٔ این صفحه به اینترنت نیاز دارید.</p>
    <button onclick="location.reload()">تلاش دوباره</button>
  </div>
</body>
</html>
