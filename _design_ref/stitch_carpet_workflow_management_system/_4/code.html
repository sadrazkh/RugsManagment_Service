<!DOCTYPE html>

<html dir="rtl" lang="fa"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ثبت فرش جدید - Aria Rug Systems</title>

<style>
        body { font-family: 'IBM Plex Sans', Tahoma, Arial, sans-serif; }
        .font-fa-title { font-family: 'Be Vietnam Pro', Tahoma, Arial, sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Transactional Header (Navigation Shell Suppressed) -->
<header class="sticky top-0 z-40 bg-surface/90 backdrop-blur-sm border-b border-outline-variant flex items-center justify-between px-md py-sm">
<button class="text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center p-xs rounded-full hover:bg-surface-container-low active:scale-95">
<span class="material-symbols-outlined">close</span>
</button>
<h1 class="font-title-md text-title-md font-fa-title text-primary">ثبت فرش جدید</h1>
<button class="text-primary font-bold text-body-md hover:bg-primary-container hover:text-on-primary-container px-sm py-xs rounded-lg transition-colors active:scale-95">
            ذخیره
        </button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-lg mx-auto p-md space-y-lg pb-xl">
<!-- Form Section: Photos -->
<section class="space-y-sm">
<h2 class="font-title-md text-title-md border-b border-outline-variant pb-xs">تصاویر (Photos)</h2>
<p class="font-body-md text-body-md text-on-surface-variant">لطفاً تصاویر با کیفیت از نقشه و بافت فرش آپلود کنید.</p>
<div class="grid grid-cols-2 gap-sm">
<!-- Main Image Upload -->
<button class="col-span-2 h-48 border-2 border-dashed border-outline-variant rounded-xl bg-surface-container-lowest flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-low hover:border-primary transition-all active:scale-[0.98]">
<span class="material-symbols-outlined text-[48px] mb-xs text-outline">add_a_photo</span>
<span class="font-body-md text-body-md">افزودن تصویر اصلی</span>
</button>
<!-- Secondary Uploads -->
<button class="h-32 border border-dashed border-outline-variant rounded-lg bg-surface-container-lowest flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-[32px] mb-base">add_photo_alternate</span>
<span class="font-label-sm text-label-sm">جزئیات بافت</span>
</button>
<button class="h-32 border border-dashed border-outline-variant rounded-lg bg-surface-container-lowest flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-[32px] mb-base">add_photo_alternate</span>
<span class="font-label-sm text-label-sm">پشت فرش</span>
</button>
</div>
</section>
<!-- Form Section: Core Info -->
<section class="space-y-sm">
<h2 class="font-title-md text-title-md border-b border-outline-variant pb-xs">اطلاعات پایه (Core Info)</h2>
<div class="space-y-sm bg-surface-container-lowest p-sm rounded-xl border border-outline-variant shadow-sm">
<!-- ID/SKU -->
<div class="flex flex-col space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="sku">شناسه کالا (SKU)</label>
<input class="w-full bg-surface border border-outline-variant rounded-lg px-sm py-xs font-label-sm text-label-sm text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-left" dir="ltr" id="sku" placeholder="مثال: TBZ-1402-001" type="text"/>
</div>
<!-- Pattern/Origin -->
<div class="flex flex-col space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="origin">محل بافت / سبک (Origin)</label>
<select class="w-full bg-surface border border-outline-variant rounded-lg px-sm py-xs font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary appearance-none" id="origin">
<option value="">انتخاب کنید...</option>
<option value="tabriz">تبریز</option>
<option value="isfahan">اصفهان</option>
<option value="kashan">کاشان</option>
<option value="qom">قم</option>
</select>
</div>
</div>
</section>
<!-- Form Section: Technical Specs -->
<section class="space-y-sm">
<h2 class="font-title-md text-title-md border-b border-outline-variant pb-xs">مشخصات فنی (Technical Specs)</h2>
<div class="space-y-sm bg-surface-container-lowest p-sm rounded-xl border border-outline-variant shadow-sm">
<!-- Dimensions -->
<div class="grid grid-cols-2 gap-sm">
<div class="flex flex-col space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="length">طول (متر)</label>
<input class="w-full bg-surface border border-outline-variant rounded-lg px-sm py-xs font-label-sm text-label-sm text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-left" dir="ltr" id="length" placeholder="3.00" step="0.01" type="number"/>
</div>
<div class="flex flex-col space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="width">عرض (متر)</label>
<input class="w-full bg-surface border border-outline-variant rounded-lg px-sm py-xs font-label-sm text-label-sm text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-left" dir="ltr" id="width" placeholder="2.00" step="0.01" type="number"/>
</div>
</div>
<!-- Density -->
<div class="flex flex-col space-y-xs pt-xs border-t border-surface-variant">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="density">تراکم گره (رج)</label>
<input class="w-full bg-surface border border-outline-variant rounded-lg px-sm py-xs font-label-sm text-label-sm text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-left" dir="ltr" id="density" placeholder="مثال: 50" type="number"/>
</div>
</div>
</section>
<!-- Submit Action -->
<div class="pt-sm">
<button class="w-full bg-primary text-on-primary font-title-md text-title-md py-sm rounded-xl shadow-md hover:bg-primary-container hover:text-on-primary-container transition-all active:scale-[0.98] flex items-center justify-center gap-xs">
<span class="material-symbols-outlined">check_circle</span>
                ثبت نهایی فرش
            </button>
</div>
</main>
</body></html>
